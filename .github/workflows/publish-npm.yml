name: Publish npm

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "npm version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
  schedule:
    - cron: "17 2 * * *"
  push:
    branches:
      - main
    paths:
      - package.json
      - pnpm-lock.yaml
      - src/**
      - scripts/**
      - test/**
      - skills/**
      - README.md

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    name: Update, bump, and publish npm package
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]') }}
    env:
      HULY_MCP_PACKAGE: "@firfi/huly-mcp"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check versions
        id: versions
        shell: bash
        run: |
          set -euo pipefail

          package_name="$(node -p "require('./package.json').name")"
          current="$(node -p "require('./package.json').version")"
          published="$(npm view "$package_name" version 2>/dev/null || true)"
          current_mcp="$(node -p "require('./package.json').dependencies[process.env.HULY_MCP_PACKAGE]")"
          current_mcp="${current_mcp#^}"
          current_mcp="${current_mcp#~}"
          latest_mcp="$(npm view "$HULY_MCP_PACKAGE" version)"

          echo "package_name=$package_name" >> "$GITHUB_OUTPUT"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "published=$published" >> "$GITHUB_OUTPUT"
          echo "current_mcp=$current_mcp" >> "$GITHUB_OUTPUT"
          echo "latest_mcp=$latest_mcp" >> "$GITHUB_OUTPUT"

          if [ -n "$published" ] && [ "$current" != "$published" ]; then
            echo "current_unpublished=true" >> "$GITHUB_OUTPUT"
            echo "$package_name@$current is not published yet; publishing without another bump."
          else
            echo "current_unpublished=false" >> "$GITHUB_OUTPUT"
            echo "$package_name current=$current published=${published:-none}; bumping before publish."
          fi

          if [ "$current_mcp" = "$latest_mcp" ]; then
            echo "mcp_update_available=false" >> "$GITHUB_OUTPUT"
            echo "$HULY_MCP_PACKAGE is already up to date: $current_mcp"
          else
            echo "mcp_update_available=true" >> "$GITHUB_OUTPUT"
            echo "$HULY_MCP_PACKAGE update available: $current_mcp -> $latest_mcp"
          fi

      - name: Update huly-mcp dependency
        if: github.event_name == 'schedule' && steps.versions.outputs.mcp_update_available == 'true'
        run: pnpm add "$HULY_MCP_PACKAGE@${{ steps.versions.outputs.latest_mcp }}" --save-exact

      - name: Bump package version
        if: steps.versions.outputs.current_unpublished != 'true'
        id: bump
        shell: bash
        run: |
          set -euo pipefail

          bump_type="${{ github.event.inputs.version_type || 'patch' }}"
          npm version "$bump_type" --no-git-tag-version
          version="$(node -p "require('./package.json').version")"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Bumped to $version"

      - name: Use current unpublished version
        if: steps.versions.outputs.current_unpublished == 'true'
        id: current
        shell: bash
        run: |
          set -euo pipefail

          version="$(node -p "require('./package.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Publishing existing unpublished version $version"

      - name: Verify package
        run: pnpm check

      - name: Commit version bump
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.bump.outputs.version || steps.current.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git diff --quiet -- package.json pnpm-lock.yaml; then
            git add package.json pnpm-lock.yaml
            git commit -m "chore(release): v$version [skip ci]"
          fi

          if ! git rev-parse "v$version" >/dev/null 2>&1; then
            git tag -a "v$version" -m "Release v$version"
          fi

          git push origin HEAD:main "v$version"

      - name: Publish to npm
        run: pnpm publish --access public --provenance --no-git-checks

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.bump.outputs.version || steps.current.outputs.version }}"
          tag="v$version"
          notes="Published @starhui/huly-cli@$version to npm."

          if [ "${{ steps.versions.outputs.mcp_update_available }}" = "true" ]; then
            notes="$notes\n\nUpdated @firfi/huly-mcp from ${{ steps.versions.outputs.current_mcp }} to ${{ steps.versions.outputs.latest_mcp }}."
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$tag" --latest --notes "$notes"
          else
            gh release create "$tag" --title "$tag" --latest --notes "$notes"
          fi
