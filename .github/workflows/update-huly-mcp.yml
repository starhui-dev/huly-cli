name: Update huly-mcp

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: write
  id-token: write

concurrency:
  group: update-huly-mcp
  cancel-in-progress: false

jobs:
  update:
    name: Update @firfi/huly-mcp and publish CLI
    runs-on: ubuntu-latest
    env:
      CI: "true"
      HULY_MCP_PACKAGE: "@firfi/huly-mcp"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check versions
        id: versions
        shell: bash
        run: |
          set -euo pipefail

          current_mcp="$(node -p "require('./package.json').dependencies[process.env.HULY_MCP_PACKAGE]")"
          current_mcp="${current_mcp#^}"
          current_mcp="${current_mcp#~}"
          latest_mcp="$(npm view "$HULY_MCP_PACKAGE" version)"

          package_name="$(node -p "require('./package.json').name")"
          cli_version="$(node -p "require('./package.json').version")"
          published_cli="$(npm view "$package_name" version 2>/dev/null || true)"

          echo "current_mcp=$current_mcp" >> "$GITHUB_OUTPUT"
          echo "latest_mcp=$latest_mcp" >> "$GITHUB_OUTPUT"
          echo "package_name=$package_name" >> "$GITHUB_OUTPUT"
          echo "cli_version=$cli_version" >> "$GITHUB_OUTPUT"
          echo "published_cli=$published_cli" >> "$GITHUB_OUTPUT"

          if [ "$current_mcp" = "$latest_mcp" ]; then
            echo "update_available=false" >> "$GITHUB_OUTPUT"
            echo "$HULY_MCP_PACKAGE is already up to date: $current_mcp"
          else
            echo "update_available=true" >> "$GITHUB_OUTPUT"
            echo "$HULY_MCP_PACKAGE update available: $current_mcp -> $latest_mcp"
          fi

          if [ "$cli_version" = "$published_cli" ]; then
            echo "current_cli_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "current_cli_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update dependency and bump CLI version
        if: steps.versions.outputs.update_available == 'true'
        id: bump
        shell: bash
        run: |
          set -euo pipefail

          pnpm add "$HULY_MCP_PACKAGE@${{ steps.versions.outputs.latest_mcp }}" --save-exact
          npm version patch --no-git-tag-version

          version="$(node -p "require('./package.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Bumped CLI to $version"

      - name: Use current unpublished CLI version
        if: steps.versions.outputs.update_available != 'true' && steps.versions.outputs.current_cli_published != 'true'
        id: current_unpublished
        shell: bash
        run: |
          set -euo pipefail

          version="$(node -p "require('./package.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Publishing existing unpublished CLI version $version"

      - name: Verify package
        if: steps.versions.outputs.update_available == 'true' || steps.versions.outputs.current_cli_published != 'true'
        run: pnpm check

      - name: Commit and tag release
        if: steps.versions.outputs.update_available == 'true' || steps.versions.outputs.current_cli_published != 'true'
        id: release
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.bump.outputs.version || steps.current_unpublished.outputs.version }}"
          tag="v$version"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git diff --quiet -- package.json pnpm-lock.yaml; then
            git add package.json pnpm-lock.yaml
            git commit -m "chore(release): huly-mcp ${{ steps.versions.outputs.latest_mcp }} / cli v$version [skip ci]"
          fi

          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "$tag already exists locally."
          else
            git tag "$tag"
          fi

          git push origin HEAD:main --follow-tags
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        if: steps.versions.outputs.update_available == 'true' || steps.versions.outputs.current_cli_published != 'true'
        run: pnpm publish --access public --provenance --no-git-checks

      - name: Create GitHub release
        if: steps.versions.outputs.update_available == 'true' || steps.versions.outputs.current_cli_published != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.release.outputs.version }}"
          tag="v$version"
          notes="Published @starhui/huly-cli@$version to npm."

          if [ "${{ steps.versions.outputs.update_available }}" = "true" ]; then
            notes="$notes\n\nUpdated @firfi/huly-mcp from ${{ steps.versions.outputs.current_mcp }} to ${{ steps.versions.outputs.latest_mcp }}."
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$tag" --latest --notes "$notes"
          else
            gh release create "$tag" --title "$tag" --latest --notes "$notes"
          fi

      - name: No update needed
        if: steps.versions.outputs.update_available != 'true' && steps.versions.outputs.current_cli_published == 'true'
        run: echo "@firfi/huly-mcp and @starhui/huly-cli are already current."
